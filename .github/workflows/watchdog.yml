name: Health watchdog

# Dead-man's switch: a 10-second job, offset between the campaign runs, that
# reads the last committed checkpoint timestamp and screams on the (dedicated)
# SKIM Telegram bot if the chain has gone quiet. Silent when healthy. You
# only ever hear from it when something died.
on:
  schedule:
    - cron: "49 3,9,15,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read              # read-only: the watchdog never writes anything

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check heartbeat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python health.py --watchdog
